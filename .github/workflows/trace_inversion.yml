name: Trace Inversion (Summary-to-Trace)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/trace_inversion.yml"

jobs:
  summary_to_trace_distill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
      TRANSFORMERS_NO_ADVISORY_WARNINGS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir \
            "torch>=2.3" \
            "transformers>=4.45" \
            "datasets>=2.20" \
            "accelerate>=0.34"

      - name: Run summary-to-trace inversion smoke experiment
        run: |
          python - <<'PY'
          import random
          import re

          import torch
          from datasets import Dataset
          from transformers import (
              AutoModelForCausalLM,
              AutoTokenizer,
              Trainer,
              TrainingArguments,
          )

          random.seed(42)
          torch.manual_seed(42)

          MODEL_NAME = "sshleifer/tiny-gpt2"
          MAX_LENGTH = 128
          MAX_STEPS = 4

          def normalize(text: str):
              text = text.lower()
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def token_overlap_f1(pred: str, ref: str) -> float:
              p_tokens = normalize(pred).split()
              r_tokens = normalize(ref).split()
              if not p_tokens or not r_tokens:
                  return 0.0
              p_set = set(p_tokens)
              r_set = set(r_tokens)
              overlap = len(p_set & r_set)
              if overlap == 0:
                  return 0.0
              precision = overlap / len(p_set)
              recall = overlap / len(r_set)
              return 2 * precision * recall / (precision + recall)

          examples = [
              {
                  "summary": "Add the first two positive integers.",
                  "trace": "We need 1 plus 2. Adding them gives 3. Therefore the answer is 3.",
              },
              {
                  "summary": "Name the capital of France.",
                  "trace": "France's capital city is Paris. Therefore the answer is Paris.",
              },
              {
                  "summary": "State what color the sky usually appears on a clear day.",
                  "trace": "On a clear day, the sky usually appears blue. Therefore the answer is blue.",
              },
              {
                  "summary": "What do you get if you multiply 3 by 4?",
                  "trace": "Multiplying 3 by 4 gives 12. Therefore the answer is 12.",
              },
              {
                  "summary": "How many days are in a week?",
                  "trace": "A standard week has 7 days. Therefore the answer is 7.",
              },
              {
                  "summary": "Which animal says meow?",
                  "trace": "A cat is the animal commonly associated with saying meow. Therefore the answer is cat.",
              },
          ]

          def build_text(example):
              prompt = (
                  "You are reconstructing a full reasoning trace from a compressed summary.\n"
                  f"Summary:\n{example['summary']}\n\n"
                  "Reconstructed full trace:\n"
              )
              return {**example, "text": prompt + example["trace"], "prompt": prompt}

          dataset = Dataset.from_list([build_text(example) for example in examples])
          train_ds = dataset.select(range(4))
          eval_ds = dataset.select(range(4, len(dataset)))

          print(f"Loading tokenizer and model: {MODEL_NAME}")
          tokenizer = AutoTokenizer.from_pretrained(MODEL_NAME, use_fast=True)
          if tokenizer.pad_token is None:
              tokenizer.pad_token = tokenizer.eos_token

          model = AutoModelForCausalLM.from_pretrained(MODEL_NAME)
          model.config.pad_token_id = tokenizer.pad_token_id

          def tokenize_batch(batch):
              tokens = tokenizer(
                  batch["text"],
                  truncation=True,
                  max_length=MAX_LENGTH,
                  padding="max_length",
              )
              tokens["labels"] = [ids[:] for ids in tokens["input_ids"]]
              return tokens

          tokenized_train = train_ds.map(tokenize_batch, batched=True, remove_columns=train_ds.column_names)
          tokenized_eval = eval_ds.map(tokenize_batch, batched=True, remove_columns=eval_ds.column_names)

          args = TrainingArguments(
              output_dir="trace-inversion-artifacts",
              overwrite_output_dir=True,
              per_device_train_batch_size=1,
              per_device_eval_batch_size=1,
              learning_rate=5e-5,
              num_train_epochs=1,
              max_steps=MAX_STEPS,
              logging_steps=1,
              eval_strategy="steps",
              eval_steps=2,
              save_strategy="no",
              report_to=[],
              fp16=False,
              bf16=False,
              remove_unused_columns=False,
          )

          trainer = Trainer(
              model=model,
              args=args,
              train_dataset=tokenized_train,
              eval_dataset=tokenized_eval,
              processing_class=tokenizer,
          )

          print("Starting capped run...")
          trainer.train()

          print("Evaluating inversion quality via token-overlap F1 on eval subset...")
          f1_scores = []
          model.eval()
          for example in eval_ds:
              inputs = tokenizer(example["prompt"], return_tensors="pt", truncation=True, max_length=MAX_LENGTH)
              with torch.no_grad():
                  generated = model.generate(
                      **inputs,
                      max_new_tokens=48,
                      do_sample=False,
                      pad_token_id=tokenizer.pad_token_id,
                  )
              pred = tokenizer.decode(generated[0], skip_special_tokens=True)
              f1_scores.append(token_overlap_f1(pred, example["trace"]))

          mean_f1 = sum(f1_scores) / max(1, len(f1_scores))
          print(f"token_overlap_f1_mean={mean_f1:.4f}")
          print("Trace inversion smoke test complete.")
          PY
